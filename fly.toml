app = "mindtrack"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_NAME = "MindTrack API"
  VERSION = "1.0.0"
  DEBUG = "false"
  ENVIRONMENT = "production"
  ALGORITHM = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "30"
  REFRESH_TOKEN_EXPIRE_DAYS = "30"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
